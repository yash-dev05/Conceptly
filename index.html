<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conceptly</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
   
    <link rel="icon" sizes="32x32" type="image/png" href="tutor-logo.png  ">


    <style>
        :root {
            --primary: #2d255e;
            /* Sidebar purple */
            --accent: #FFD166;
            /* Highlight yellow */
            --background: #FFFFFF;
            /* Main chat background (white) */
            --bot-bubble: #ECEBFF;
            /* AI tutor bubble (light lavender) */
            --user-bubble: #F1F3F4;
            /* User bubble (light gray) */
            --success: #3DDC97;
            /* Correct/positive feedback green */
            --error: #FF6B6B;
            /* Error red */
            --active: rgba(255, 255, 255, 0.08);
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--background);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .top-section {
            flex-grow: 1;
        }

        .sidebar {
            width: 260px;
            background: var(--primary);
            color: white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* force exact viewport height */
            overflow: hidden;
            /* prevent internal overflow */
        }


        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-icon {
            width: 25px;
            height: 25px;
            filter: brightness(0) invert(1);
            opacity: 0.85;
            transition: 0.2s ease;
        }

        .nav-item:hover .nav-icon {
            opacity: 1;
            transform: scale(1.08);
        }

        .nav-item:hover span {
            opacity: 1;
            transform: scale(1.08);
        }

        .nav-item {
            display: flex;
            align-items: center;

            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .nav-item:hover {
            background-color: var(--active);
        }

        .nav-item.active {
            background-color: var(--active);
        }

        .nav-item {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            /* space between icon and text */
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            box-shadow: inset 0 0 0 1px white;
            /* white border around the icon */
            border-radius: 8px;
            padding: 1px;
        }

        .logo p {
            position: relative;
            /* required for ::before positioning */
            font-family: "Poppins", sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            overflow: hidden;
            cursor: pointer;
        }

        .help-box {
            margin: 20px 0;
            width: 100%;
            max-height: 100%;
            border-radius: 12px;
            object-fit: cover;
            transition: transform 0.2s ease;
            /* smooth hover effect */
        }

        .help-box:hover {
            transform: scale(1.02);

        }





        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #3b2f70;
            /* slightly lighter purple box */
            padding: 12px;
            border-radius: 19px;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-family: "Poppins", sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }
    </style>
</head>

<body>
    <div class="sidebar">

        <div class="top-section">

            <div class="logo">
                <img class="logo-icon" src="tutor-logo.png">
                <p>Conceptly AI Tutor</p>
            </div>

            <div class="nav">

                <div class="nav-item">
                    <img src="chat-dots-svgrepo-com.svg" class="nav-icon">
                    <span>New Doubt</span>
                </div>

                <div class="nav-item">
                    <img src="messages-svgrepo-com.svg" class="nav-icon">
                    <span>Recent Chats</span>
                </div>

                <div class="nav-item">
                    <img src="upload-svgrepo-com.svg" class="nav-icon">
                    <span>Uploads</span>
                </div>

                <div class="nav-item">
                    <img src="history-svgrepo-com.svg" class="nav-icon">
                    <span>Saved Concepts</span>
                </div>

                <div class="nav-item">
                    <img src="bookmark-svgrepo-com.svg" class="nav-icon">
                    <span>Bookmarks</span>
                </div>

            </div>

        </div>

        <img class="help-box" src="help.png">

        <div class="profile">
            <img src="alex-avatar.png" class="profile-avatar">
            <div class="profile-info">
                <p class="profile-name">Aditi Hajela</p>
            </div>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main"> <!-- GREETING -->
        <div class="greeting"> Hey Yash 👋<br> Let’s solve something today. </div> <!-- CHAT -->
        <div class="chat-container"> <!-- USER MESSAGE -->
            <div class="message user"> Solve this quadratic equation please. </div>
            <div class="suggestions"> <span class="chip">Explain step 2 again</span> <span class="chip">Shortcut
                    method</span> <span class="chip">Similar questions</span> <span class="chip">Create mini test</span>
            </div>
        </div>
    </div> <!-- INPUT -->
    <div class="input-area"> <label class="upload-btn"> 📎 <input type="file" hidden> </label> <input type="text"
            placeholder="Snap or type your doubt here..."> <button class="send-btn">Send</button> </div>
    </div>


</body>

</html>
